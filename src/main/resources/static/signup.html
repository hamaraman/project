<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .auth-page {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(180deg, #181818 0%, #141414 100%);
            border: 1px solid #272727;
            border-radius: 24px;
            padding: 28px;
        }

        .auth-title {
            margin: 0 0 10px;
            font-size: 30px;
            color: #fff;
        }

        .auth-subtitle {
            margin: 0 0 24px;
            color: #a9a9a9;
            line-height: 1.6;
            font-size: 14px;
        }

        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .auth-field label {
            font-size: 14px;
            color: #f1f1f1;
        }

        .auth-input {
            width: 100%;
            height: 46px;
            border: 1px solid #303030;
            background: #101010;
            color: #fff;
            border-radius: 14px;
            padding: 0 14px;
            outline: none;
        }

        .auth-input.is-invalid {
            border-color: #a33a3a;
        }

        .auth-help {
            color: #8f8f8f;
            font-size: 12px;
            line-height: 1.5;
        }

        .auth-error {
            min-height: 20px;
            color: #ff7b7b;
            font-size: 13px;
            line-height: 1.5;
        }

        .auth-submit {
            width: 100%;
            height: 44px;
            border: 1px solid #fff;
            background: #fff;
            color: #111;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }

        .auth-footer {
            margin-top: 18px;
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
        }

        .auth-footer a {
            color: #fff;
            font-weight: 700;
        }
    </style>
</head>
<body data-page="signup">
<header class="topbar">
    <div class="topbar-left">
        <a href="index.html" class="logo-wrap" aria-label="YouTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 15.5v-7l6 3.5-6 3.5Z" fill="#fff"></path>
                </svg>
            </span>
            <span class="logo-text">YouTube</span>
        </a>
    </div>
    <div class="topbar-center"></div>
    <div class="topbar-right"></div>
</header>

<main class="auth-page">
    <section class="auth-card">
        <h1 class="auth-title">회원가입</h1>
        <p class="auth-subtitle">아이디, 닉네임, 비밀번호를 입력해서 새 계정을 만들어줘.</p>

        <form id="signupForm" novalidate>
            <div class="auth-field">
                <label for="signupUsername">아이디</label>
                <input type="text" id="signupUsername" class="auth-input" maxlength="20" />
                <div class="auth-help">4~20자의 영문, 숫자, 밑줄(_)만 가능</div>
                <div class="auth-error" id="signupUsernameError"></div>
            </div>

            <div class="auth-field">
                <label for="signupNickname">닉네임</label>
                <input type="text" id="signupNickname" class="auth-input" maxlength="20" />
                <div class="auth-error" id="signupNicknameError"></div>
            </div>

            <div class="auth-field">
                <label for="signupEmail">이메일 (선택)</label>
                <input type="email" id="signupEmail" class="auth-input" maxlength="80" />
                <div class="auth-error" id="signupEmailError"></div>
            </div>

            <div class="auth-field">
                <label for="signupPassword">비밀번호</label>
                <input type="password" id="signupPassword" class="auth-input" maxlength="50" />
                <div class="auth-error" id="signupPasswordError"></div>
            </div>

            <div class="auth-field">
                <label for="signupPasswordConfirm">비밀번호 확인</label>
                <input type="password" id="signupPasswordConfirm" class="auth-input" maxlength="50" />
                <div class="auth-error" id="signupPasswordConfirmError"></div>
            </div>

            <div class="auth-error" id="signupCommonError"></div>

            <button type="submit" class="auth-submit">회원가입</button>
        </form>

        <p class="auth-footer">
            이미 계정이 있으면 <a href="login.html">로그인</a>
        </p>
    </section>
</main>

<script src="auth.js"></script>
</body>
</html>
