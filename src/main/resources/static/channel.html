<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube - 내 채널</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
        .channel-shell {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 240px;
            background: #0f0f0f;
            border-right: 1px solid #222;
            padding: 12px 10px;
            position: sticky;
            top: 56px;
            height: calc(100vh - 56px);
            overflow-y: auto;
            flex-shrink: 0;
            transition: width 0.22s ease, transform 0.22s ease;
        }

        .sidebar.is-collapsed {
            width: 72px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 40px;
            padding: 0 12px;
            border-radius: 10px;
            color: #f1f1f1;
            transition: background 0.18s ease;
        }

        .sidebar-link:hover {
            background: #222;
        }

        .sidebar-link.is-active {
            background: #272727;
            font-weight: 700;
        }

        .sidebar-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .sidebar-label {
            font-size: 14px;
            white-space: nowrap;
        }

        .sidebar.is-collapsed .sidebar-link {
            justify-content: center;
            padding: 0;
            min-height: 64px;
            flex-direction: column;
            gap: 6px;
            border-radius: 12px;
        }

        .sidebar.is-collapsed .sidebar-label {
            font-size: 11px;
            line-height: 1.2;
            text-align: center;
        }

        .channel-content {
            flex: 1;
            min-width: 0;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .menu-btn:hover {
            background: #222;
        }

        .menu-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .topbar-left {
            gap: 4px;
        }

        .mobile-sidebar-backdrop {
            display: none;
        }

        .channel-page {
            padding: 28px 32px 40px;
        }

        .channel-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .channel-hero-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .channel-avatar-lg {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4e45, #ff8a00);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .channel-hero-text h1 {
            margin: 0 0 8px;
            font-size: 30px;
            line-height: 1.2;
        }

        .channel-hero-text p {
            margin: 0;
            color: #aaa;
            font-size: 14px;
        }

        .channel-hero-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .channel-hero-btn {
            height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .channel-hero-btn.primary {
            background: #fff;
            color: #111;
            border-color: #fff;
            font-weight: 700;
        }

        .studio-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .studio-stat-card {
            background: #181818;
            border: 1px solid #272727;
            border-radius: 18px;
            padding: 18px;
        }

        .studio-stat-label {
            margin: 0 0 8px;
            color: #aaa;
            font-size: 13px;
        }

        .studio-stat-value {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .studio-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .studio-toolbar-left,
        .studio-toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .studio-search {
            width: 320px;
            max-width: 100%;
            height: 42px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #121212;
            color: #fff;
            padding: 0 16px;
            outline: none;
        }

        .studio-filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .studio-filter-btn {
            height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        .studio-filter-btn.is-active {
            background: #fff;
            color: #111;
            border-color: #fff;
            font-weight: 700;
        }

        .studio-sort {
            height: 40px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #121212;
            color: #fff;
            padding: 0 14px;
            outline: none;
        }

        .studio-table {
            background: #181818;
            border: 1px solid #272727;
            border-radius: 20px;
            overflow: hidden;
        }

        .studio-head,
        .studio-row {
            display: grid;
            grid-template-columns: minmax(280px, 2.3fr) 110px 90px 90px 90px 90px 170px;
            gap: 14px;
            align-items: center;
            padding: 16px 18px;
        }

        .studio-head {
            background: #202020;
            color: #aaa;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .studio-row {
            border-top: 1px solid #242424;
            transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        .studio-row:hover {
            background: #202020;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        .studio-row:hover .studio-video-title {
            color: #fff;
        }

        .studio-row:hover .studio-thumb {
            transform: translateY(-1px);
            border-color: #3a3a3a;
        }

        .studio-row:hover .studio-action-btn {
            background: #2a2a2a;
        }

        .studio-video-cell {
            display: flex;
            gap: 14px;
            min-width: 0;
        }

        .studio-thumb {
            width: 168px;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            background: #111;
            border: 1px solid transparent;
            transition: transform 0.18s ease, border-color 0.18s ease;
        }

        .studio-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .studio-duration {
            position: absolute;
            right: 8px;
            bottom: 8px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .studio-video-info {
            min-width: 0;
        }

        .studio-video-title {
            margin: 0 0 8px;
            font-size: 16px;
            line-height: 1.4;
            word-break: break-word;
            transition: color 0.18s ease;
        }

        .studio-video-meta,
        .studio-video-desc {
            margin: 0;
            color: #aaa;
            font-size: 13px;
            line-height: 1.55;
        }

        .studio-video-desc {
            margin-top: 6px;
        }

        .studio-cell-text,
        .studio-number {
            font-size: 14px;
            color: #f1f1f1;
        }

        .studio-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
            padding: 0 12px;
            border-radius: 999px;
            background: #222;
            border: 1px solid #303030;
            font-size: 13px;
        }

        .studio-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .studio-action-btn {
            height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .studio-action-btn:hover {
            border-color: #3b3b3b;
            transform: translateY(-1px);
        }

        .studio-action-btn.delete {
            background: #2a1616;
            border-color: #4c2424;
            color: #ffb4b4;
        }

        .studio-action-btn.delete:hover {
            background: #3a1c1c;
            border-color: #6a2e2e;
        }

        .channel-empty-state {
            margin-top: 22px;
            padding: 46px 24px;
            border: 1px solid #272727;
            border-radius: 22px;
            background: linear-gradient(180deg, #181818, #151515);
            text-align: center;
        }

        .channel-empty-icon {
            width: 74px;
            height: 74px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: #202020;
            border: 1px solid #2e2e2e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .channel-empty-icon svg {
            width: 34px;
            height: 34px;
            fill: #9aa0a6;
        }

        .channel-empty-title {
            margin: 0 0 10px;
            font-size: 22px;
            color: #fff;
        }

        .channel-empty-text {
            margin: 0;
            color: #9aa0a6;
            font-size: 15px;
            line-height: 1.75;
        }

        .channel-empty-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        .channel-empty-btn {
            min-width: 120px;
            height: 40px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid #303030;
            background: #202020;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 14px;
        }

        .channel-empty-btn.primary {
            background: #fff;
            color: #111;
            border-color: #fff;
            font-weight: 700;
        }

        @media (max-width: 1200px) {
            .studio-stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .studio-head,
            .studio-row {
                grid-template-columns: minmax(260px, 2fr) 100px 80px 80px 80px 90px 170px;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                top: 56px;
                left: 0;
                width: 240px;
                height: calc(100vh - 56px);
                z-index: 120;
                transform: translateX(-100%);
                box-shadow: 12px 0 30px rgba(0, 0, 0, 0.35);
            }

            .sidebar.is-open {
                transform: translateX(0);
            }

            .sidebar.is-collapsed {
                width: 240px;
                padding-left: 10px;
                padding-right: 10px;
            }

            .sidebar.is-collapsed .sidebar-link {
                justify-content: flex-start;
                padding: 0 12px;
                min-height: 40px;
                flex-direction: row;
                gap: 16px;
                border-radius: 10px;
            }

            .sidebar.is-collapsed .sidebar-label {
                font-size: 14px;
                text-align: left;
            }

            .mobile-sidebar-backdrop {
                display: block;
                position: fixed;
                inset: 56px 0 0 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: 110;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s ease;
            }

            .mobile-sidebar-backdrop.is-open {
                opacity: 1;
                pointer-events: auto;
            }

            .channel-content {
                width: 100%;
            }

            .channel-page {
                padding: 20px 16px 28px;
            }

            .studio-stats {
                grid-template-columns: 1fr;
            }

            .studio-table {
                overflow-x: auto;
            }

            .studio-head,
            .studio-row {
                min-width: 1080px;
            }
        }
    </style>
</head>
<body data-page="channel">
<header class="topbar">
    <div class="topbar-left">
        <button type="button" class="menu-btn" id="menuToggle" aria-label="메뉴 열기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18v2H3V6Zm0 5h18v2H3v-2Zm0 5h18v2H3v-2Z"></path>
            </svg>
        </button>

        <a href="index.html" class="logo-wrap" aria-label="YouTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 15.5v-7l6 3.5-6 3.5Z" fill="#fff"></path>
                </svg>
            </span>
            <span class="logo-text">YouTube</span>
        </a>
    </div>

    <div class="topbar-center">
        <form class="search-form" onsubmit="return false;">
            <input type="text" placeholder="검색" aria-label="검색" />
            <button type="submit" class="search-btn" aria-label="검색 버튼">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"></path>
                </svg>
            </button>
        </form>
    </div>

    <div class="topbar-right">
        <a href="upload.html" class="icon-btn" aria-label="업로드">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
            </svg>
        </a>
        <a href="channel.html" class="profile" aria-label="내 채널">T</a>
    </div>
</header>

<div class="mobile-sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="channel-shell">
    <aside class="sidebar is-collapsed" id="sidebar">
        <nav class="sidebar-section">
            <a href="index.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 10.5 12 4l8 6.5V20h-5v-5h-6v5H4v-9.5Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">홈</span>
            </a>
        </nav>

        <nav class="sidebar-section">
            <a href="saved.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M17 3H7a2 2 0 0 0-2 2v16l7-4 7 4V5a2 2 0 0 0-2-2Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">저장한 영상</span>
            </a>

            <a href="liked.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m12 21-1.45-1.32C5.4 15.05 2 11.97 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.47-3.4 6.55-8.55 11.18L12 21Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">좋아요한 영상</span>
            </a>
            <a href="history.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m12 21-1.45-1.32C5.4 15.05 2 11.97 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.47-3.4 6.55-8.55 11.18L12 21Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">시청 기록</span>
            </a>
        </nav>

        <nav class="sidebar-section">
            <a href="channel.html" class="sidebar-link is-active">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">내 채널</span>
            </a>

            <a href="upload.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">업로드</span>
            </a>
        </nav>
    </aside>

    <main class="channel-content">
        <section class="channel-page">
            <div class="channel-hero">
                <div class="channel-hero-left">
                    <div class="channel-avatar-lg">T</div>
                    <div class="channel-hero-text">
                        <h1>테리로 채널</h1>
                        <p>업로드한 영상을 관리하고 상태를 확인해보자.</p>
                    </div>
                </div>

                <div class="channel-hero-actions">
                    <a href="upload.html" class="channel-hero-btn primary">영상 업로드</a>
                    <a href="index.html" class="channel-hero-btn">홈으로 이동</a>
                </div>
            </div>

            <section class="studio-stats">
                <article class="studio-stat-card">
                    <p class="studio-stat-label">총 영상</p>
                    <p class="studio-stat-value" id="studioVideoCount">0</p>
                </article>
                <article class="studio-stat-card">
                    <p class="studio-stat-label">총 조회수</p>
                    <p class="studio-stat-value" id="studioTotalViews">0</p>
                </article>
                <article class="studio-stat-card">
                    <p class="studio-stat-label">총 좋아요</p>
                    <p class="studio-stat-value" id="studioTotalLikes">0</p>
                </article>
                <article class="studio-stat-card">
                    <p class="studio-stat-label">총 댓글</p>
                    <p class="studio-stat-value" id="studioTotalComments">0</p>
                </article>
            </section>

            <section class="studio-toolbar">
                <div class="studio-toolbar-left">
                    <input
                        type="text"
                        id="channelSearchInput"
                        class="studio-search"
                        placeholder="영상 검색"
                        aria-label="영상 검색"
                    />

                    <div class="studio-filter-group" id="channelVisibilityFilter">
                        <button type="button" class="studio-filter-btn is-active" data-filter="전체">전체</button>
                        <button type="button" class="studio-filter-btn" data-filter="공개">공개</button>
                        <button type="button" class="studio-filter-btn" data-filter="비공개">비공개</button>
                        <button type="button" class="studio-filter-btn" data-filter="일부 공개">일부 공개</button>
                    </div>
                </div>

                <div class="studio-toolbar-right">
                    <select id="channelSortSelect" class="studio-sort" aria-label="정렬">
                        <option value="latest">최신순</option>
                        <option value="oldest">오래된순</option>
                        <option value="views">조회수순</option>
                        <option value="likes">좋아요순</option>
                        <option value="comments">댓글순</option>
                        <option value="title">제목순</option>
                    </select>
                </div>
            </section>

            <section class="studio-table">
                <div class="studio-head">
                    <div>영상</div>
                    <div>카테고리</div>
                    <div>조회수</div>
                    <div>좋아요</div>
                    <div>댓글</div>
                    <div>상태</div>
                    <div>관리</div>
                </div>

                <div id="channelManageList"></div>
            </section>

            <section class="channel-empty-state" id="channelEmptyState" hidden>
                <div class="channel-empty-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M17 10.5V6a2 2 0 0 0-2-2H5A2 2 0 0 0 3 6v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4.5l4 4v-11l-4 4Z"></path>
                    </svg>
                </div>
                <h3 class="channel-empty-title" id="channelEmptyTitle">아직 업로드한 영상이 없습니다</h3>
                <p class="channel-empty-text" id="channelEmptyText">
                    첫 영상을 업로드해서 채널을 채워보자.
                </p>
                <div class="channel-empty-actions">
                    <a href="upload.html" class="channel-empty-btn primary">영상 업로드</a>

<script src="auth.js"></script>
<script src="script.js"></script>
<script>
    (function () {
        const sidebar = document.getElementById("sidebar");
        const menuToggle = document.getElementById("menuToggle");
        const backdrop = document.getElementById("sidebarBackdrop");

        if (!sidebar || !menuToggle || !backdrop) return;

        function isMobile() {
            return window.innerWidth <= 900;
        }

        function closeMobileSidebar() {
            sidebar.classList.remove("is-open");
            backdrop.classList.remove("is-open");
        }

        function toggleDesktopSidebar() {
            sidebar.classList.toggle("is-collapsed");
        }

        menuToggle.addEventListener("click", () => {
            if (isMobile()) {
                sidebar.classList.toggle("is-open");
                backdrop.classList.toggle("is-open");
            } else {
                toggleDesktopSidebar();
            }
        });

        backdrop.addEventListener("click", closeMobileSidebar);

        window.addEventListener("resize", () => {
            if (!isMobile()) {
                closeMobileSidebar();
            }
        });
    })();
</script>
</body>
</html>
